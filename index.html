<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRESENTASI PROPOSAL TUGAS AKHIR</title>
    <link rel="icon" type="image/png" href="Logo.png">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            background-color: #000;
        }

        .iframe-container {
            position: relative;
            width: 100%;
            padding-top: 56.25%; /* Rasio 16:9 */
        }

        .iframe-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Optional: Mobile adjustment */
        @media screen and (max-width: 768px) {
            .iframe-container {
                padding-top: 75%; /* Lebih nyaman di HP */
            }
        }
    </style>
</head>

<body>

    <div class="iframe-container">
        <iframe 
            src="https://www.canva.com/design/DAHGj4lWe5M/uggPkAugFbf4o6Pzc5s14w/view" 
            allowfullscreen>
        </iframe>
    </div>

</body>

</html>
